<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>USUNG ACE · 관리자</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Pretendard:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0a0a; --sf:#111114; --cd:#17171c; --bd:#26262e;
  --ac:#3b82f6; --ac2:#60a5fa; --gn:#22c55e; --rd:#ef4444; --am:#f59e0b;
  --tx:#f5f5f7; --tx2:#c7c7cc; --tx3:#8e8e93; --tx4:#636366; --tx5:#48484a;
  --sd:0 10px 30px -10px rgba(0,0,0,.6);
}
body.light{
  --bg:#f5f5f7; --sf:#ffffff; --cd:#fafafa; --bd:#e5e5ea;
  --tx:#0a0a0a; --tx2:#1c1c1e; --tx3:#3a3a3c; --tx4:#8e8e93; --tx5:#c7c7cc;
  --sd:0 10px 30px -10px rgba(0,0,0,.12);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-font-smoothing:antialiased}
html,body{height:100%}
body{font-family:'Pretendard','Inter',-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg);color:var(--tx);font-size:14px;line-height:1.5}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,textarea,select{font-family:inherit;color:inherit;background:transparent;border:none;outline:none;width:100%}
a{color:inherit;text-decoration:none}

/* ============ LOGIN ============ */
.login{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;background:radial-gradient(circle at 20% 20%,rgba(59,130,246,.18),transparent 50%),radial-gradient(circle at 80% 80%,rgba(96,165,250,.12),transparent 50%),var(--bg)}
.login-card{width:100%;max-width:420px;background:var(--sf);border:1px solid var(--bd);border-radius:24px;padding:44px 36px;box-shadow:var(--sd)}
.login-brand{text-align:center;margin-bottom:36px}
.login-logo{display:inline-flex;align-items:center;gap:10px;font-size:20px;font-weight:800;letter-spacing:-0.5px}
.login-logo .dot{width:10px;height:10px;border-radius:50%;background:var(--ac);box-shadow:0 0 20px var(--ac)}
.login-sub{margin-top:8px;color:var(--tx3);font-size:13px}
.login-field{margin-bottom:14px}
.login-field label{display:block;font-size:12px;color:var(--tx3);margin-bottom:6px;font-weight:600}
.login-field input{padding:14px 16px;background:var(--cd);border:1px solid var(--bd);border-radius:12px;font-size:14px;transition:border .15s}
.login-field input:focus{border-color:var(--ac)}
.login-btn{width:100%;padding:14px;background:var(--ac);color:#fff;border-radius:12px;font-weight:700;font-size:14px;margin-top:8px;transition:transform .1s}
.login-btn:hover{background:var(--ac2)}
.login-btn:active{transform:scale(.98)}
.login-hint{text-align:center;margin-top:18px;font-size:12px;color:var(--tx4)}

/* ============ LAYOUT ============ */
.app{display:none;min-height:100vh}
.app.active{display:flex}
.sb{width:220px;background:var(--sf);border-right:1px solid var(--bd);display:flex;flex-direction:column;position:fixed;top:0;bottom:0;left:0;z-index:10}
.sb-brand{padding:20px 18px;border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:10px}
.sb-brand .dot{width:10px;height:10px;border-radius:50%;background:var(--ac);box-shadow:0 0 14px var(--ac)}
.sb-brand .nm{font-weight:800;font-size:15px;letter-spacing:-0.3px}
.sb-brand .tg{font-size:10px;color:var(--tx4);letter-spacing:.1em;text-transform:uppercase}
.sb-nav{flex:1;padding:14px 10px;overflow-y:auto}
.sb-sec{font-size:10px;color:var(--tx4);text-transform:uppercase;letter-spacing:.1em;padding:14px 10px 8px;font-weight:700}
.sb-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;color:var(--tx2);font-size:13px;font-weight:500;transition:all .12s;margin-bottom:2px;cursor:pointer;width:100%;text-align:left}
.sb-item:hover{background:var(--cd);color:var(--tx)}
.sb-item.active{background:var(--ac);color:#fff}
.sb-item .ic{font-size:15px;width:18px;text-align:center}
.sb-item .bd-num{margin-left:auto;font-size:10px;padding:2px 6px;border-radius:8px;background:var(--cd);color:var(--tx3)}
.sb-item.active .bd-num{background:rgba(255,255,255,.25);color:#fff}
.sb-user{padding:14px;border-top:1px solid var(--bd);display:flex;align-items:center;gap:10px}
.sb-user .av{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,var(--ac),var(--ac2));display:flex;align-items:center;justify-content:center;font-weight:700;color:#fff;font-size:13px}
.sb-user .nm{font-size:12px;font-weight:600}
.sb-user .em{font-size:10px;color:var(--tx4)}
.sb-user .lo{margin-left:auto;padding:6px 10px;border:1px solid var(--bd);border-radius:8px;font-size:11px;color:var(--tx3)}
.sb-user .lo:hover{background:var(--cd);color:var(--tx)}

.main{flex:1;margin-left:220px;min-height:100vh;display:flex;flex-direction:column}
.tb{height:54px;background:var(--sf);border-bottom:1px solid var(--bd);display:flex;align-items:center;padding:0 22px;gap:14px;position:sticky;top:0;z-index:5}
.tb-ti{font-weight:700;font-size:15px}
.tb-sp{flex:1}
.tb-btn{padding:7px 12px;border:1px solid var(--bd);border-radius:9px;font-size:12px;font-weight:600;color:var(--tx2);display:flex;align-items:center;gap:6px}
.tb-btn:hover{background:var(--cd);color:var(--tx)}
.tb-btn.pri{background:var(--ac);color:#fff;border-color:var(--ac)}
.tb-btn.pri:hover{background:var(--ac2)}
.tb-mo{padding:7px 10px;background:var(--cd);border:1px solid var(--bd);border-radius:9px;font-size:11px;color:var(--tx2);display:flex;align-items:center;gap:6px}
.tb-mo .dot{width:6px;height:6px;border-radius:50%;background:var(--gn)}

.ct{flex:1;padding:22px}

/* ============ VIEW ============ */
.vw{display:none}
.vw.active{display:block}
.vw-hd{display:flex;align-items:center;margin-bottom:20px;gap:14px}
.vw-ti{font-size:22px;font-weight:800;letter-spacing:-0.4px}
.vw-sub{color:var(--tx3);font-size:13px;margin-top:3px}

/* ============ CARDS ============ */
.cd{background:var(--sf);border:1px solid var(--bd);border-radius:16px;padding:18px;margin-bottom:14px}
.cd-ti{font-size:13px;font-weight:700;color:var(--tx2);margin-bottom:12px;display:flex;align-items:center;gap:8px}
.cd-ti .ln{flex:1;height:1px;background:var(--bd)}

/* ============ DASHBOARD ============ */
.st-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px}
.st-cd{background:var(--sf);border:1px solid var(--bd);border-radius:16px;padding:18px 20px;position:relative;overflow:hidden}
.st-cd::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,var(--ac) 0%,transparent 40%);opacity:.08}
.st-cd .lb{font-size:11px;color:var(--tx3);text-transform:uppercase;letter-spacing:.08em;font-weight:600;position:relative}
.st-cd .vl{font-size:28px;font-weight:800;margin-top:6px;letter-spacing:-0.8px;position:relative}
.st-cd .dl{font-size:11px;color:var(--gn);margin-top:4px;position:relative;font-weight:600}
.st-cd .dl.dn{color:var(--rd)}

.db-grid{display:grid;grid-template-columns:1.4fr 1fr;gap:14px}
.bar-wrap{display:flex;align-items:flex-end;gap:10px;height:180px;padding-top:10px}
.bar{flex:1;background:linear-gradient(180deg,var(--ac),var(--ac2));border-radius:6px 6px 0 0;position:relative;min-height:6px;transition:all .3s}
.bar:hover{transform:translateY(-3px)}
.bar-lb{text-align:center;font-size:10px;color:var(--tx4);margin-top:6px;font-weight:600}
.bar-vl{position:absolute;top:-18px;left:50%;transform:translateX(-50%);font-size:10px;font-weight:700;color:var(--tx2)}

.rc-lst{display:flex;flex-direction:column;gap:8px;max-height:280px;overflow-y:auto}
.rc-it{padding:10px 12px;background:var(--cd);border-radius:10px;display:flex;align-items:center;gap:10px}
.rc-it .av{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,var(--ac),var(--ac2));display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;flex-shrink:0}
.rc-it .info{flex:1;min-width:0}
.rc-it .nm{font-size:12px;font-weight:600}
.rc-it .ms{font-size:11px;color:var(--tx4);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rc-it .tg{font-size:10px;padding:2px 7px;border-radius:6px;font-weight:600}
.tg-new{background:rgba(34,197,94,.15);color:var(--gn)}
.tg-pd{background:rgba(245,158,11,.15);color:var(--am)}
.tg-rp{background:rgba(139,139,139,.15);color:var(--tx3)}

/* ============ PAGES / EDIT ============ */
.pg-list{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.pg-tile{background:var(--sf);border:1px solid var(--bd);border-radius:14px;padding:18px;cursor:pointer;transition:all .15s;position:relative}
.pg-tile:hover{border-color:var(--ac);transform:translateY(-2px)}
.pg-tile .ic{width:38px;height:38px;border-radius:10px;background:var(--cd);display:flex;align-items:center;justify-content:center;font-size:18px;margin-bottom:12px}
.pg-tile .nm{font-weight:700;font-size:14px}
.pg-tile .mt{font-size:11px;color:var(--tx4);margin-top:4px}
.pg-tile .hd{position:absolute;top:14px;right:14px;font-size:9px;padding:2px 7px;border-radius:6px;background:rgba(239,68,68,.15);color:var(--rd);font-weight:700}

.mode-sw{display:inline-flex;background:var(--cd);border:1px solid var(--bd);border-radius:10px;padding:3px;gap:2px}
.mode-sw button{padding:6px 12px;border-radius:7px;font-size:11px;color:var(--tx3);font-weight:600}
.mode-sw button.active{background:var(--ac);color:#fff}

.ed-sec{background:var(--sf);border:1px solid var(--bd);border-radius:14px;padding:18px;margin-bottom:12px}
.ed-sec-hd{display:flex;align-items:center;margin-bottom:12px}
.ed-sec-ti{font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--tx2)}
.ed-sec-sp{flex:1}
.ed-fl{display:flex;flex-direction:column;gap:10px}
.ed-ln{display:grid;grid-template-columns:160px 1fr;gap:12px;align-items:start;padding:8px 0;border-bottom:1px dashed var(--bd)}
.ed-ln:last-child{border-bottom:none}
.ed-lb{font-size:11px;color:var(--tx3);font-weight:600;padding-top:9px;text-transform:uppercase;letter-spacing:.05em}
.ed-in{padding:9px 12px;background:var(--cd);border:1px solid var(--bd);border-radius:9px;font-size:13px;min-height:36px;word-break:break-word;white-space:pre-wrap}
.ed-in:focus{border-color:var(--ac);outline:none}
.ed-in[contenteditable="true"]{cursor:text}
textarea.ed-in{min-height:72px;resize:vertical;line-height:1.5}
.img-up{background:var(--cd);border:1px dashed var(--bd);border-radius:10px;padding:14px;display:flex;gap:12px;align-items:center}
.img-up img{width:68px;height:68px;object-fit:cover;border-radius:7px;background:var(--bd)}
.img-up .bt{padding:7px 12px;border:1px solid var(--bd);border-radius:8px;font-size:11px;background:var(--sf);font-weight:600}
.img-up .bt:hover{background:var(--bd)}

.live-wrap{background:var(--cd);border:1px solid var(--bd);border-radius:14px;padding:24px;min-height:400px}
.w-h1{font-size:28px;font-weight:800;color:var(--tx);line-height:1.2;margin-bottom:10px;letter-spacing:-0.5px}
.w-h2{font-size:20px;font-weight:700;color:var(--tx);margin:14px 0 8px}
.w-p{color:var(--tx2);font-size:13px;line-height:1.6;margin-bottom:8px}
.w-tag{display:inline-block;padding:4px 10px;background:rgba(255,90,31,.15);color:var(--ac);border-radius:20px;font-size:11px;font-weight:600;margin-bottom:10px}
.w-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:14px}
.w-card{background:var(--sf);border:1px solid var(--bd);border-radius:12px;padding:14px}
.w-card .nm{font-weight:700;font-size:13px;margin-bottom:4px}
.w-card .de{font-size:11px;color:var(--tx4)}
.w-img{width:100%;height:140px;object-fit:cover;border-radius:10px;background:var(--bd);margin-bottom:10px}
[contenteditable="true"]{border-radius:6px;padding:2px 5px;margin:-2px -5px;transition:background .12s;outline:none}
[contenteditable="true"]:hover{background:rgba(59,130,246,.1)}
[contenteditable="true"]:focus{background:rgba(59,130,246,.18);box-shadow:inset 0 0 0 1px var(--ac)}

/* =============== LIVE PREVIEW 홈페이지 미러링 =============== */
.live-stage{background:#000;border-radius:18px;overflow:hidden;border:1px solid #222;color:#fff;font-family:'Pretendard','Inter',sans-serif;padding:40px 28px;min-height:500px;position:relative}
.live-stage *{color:inherit}
.live-stage .lp-tag{font-size:11px;font-weight:700;letter-spacing:.32em;color:#60a5fa;margin-bottom:20px;display:block}
.live-stage .lp-h1{font-size:42px;font-weight:900;letter-spacing:-0.04em;line-height:.95;color:#fff;margin-bottom:18px}
.live-stage .lp-h1 .grad,.live-stage .grad{background:linear-gradient(90deg,#60a5fa,#67e8f9,#3b82f6);-webkit-background-clip:text;background-clip:text;color:transparent}
.live-stage .lp-sub{font-size:16px;color:rgba(255,255,255,.6);line-height:1.6;max-width:620px}
.live-stage .lp-h2{font-size:28px;font-weight:900;letter-spacing:-0.02em;line-height:1.1;color:#fff;margin:26px 0 10px}
.live-stage .lp-p{color:rgba(255,255,255,.7);font-size:13px;line-height:1.7;margin-bottom:8px}
.live-stage .lp-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-top:20px}
.live-stage .lp-cell{background:#000;border:1px solid rgba(255,255,255,.1);border-radius:14px;padding:18px}
.live-stage .lp-cell .lb{font-size:10px;font-weight:700;letter-spacing:.18em;color:#60a5fa;margin-bottom:8px}
.live-stage .lp-cell .vl{font-size:20px;font-weight:800;color:#fff;letter-spacing:-0.02em}
.live-stage .lp-cell .sm{font-size:11px;color:rgba(255,255,255,.45);margin-top:3px}
.live-stage .lp-feats{display:grid;grid-template-columns:repeat(2,1fr);gap:16px;margin-top:24px}
.live-stage .lp-feat{display:flex;gap:14px;padding:14px;border-radius:14px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06)}
.live-stage .lp-feat .ic{width:42px;height:42px;flex-shrink:0;border-radius:12px;background:rgba(59,130,246,.15);color:#60a5fa;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:800}
.live-stage .lp-feat h4{font-size:15px;font-weight:900;color:#fff;margin-bottom:4px;letter-spacing:-0.01em}
.live-stage .lp-feat p{font-size:12px;color:rgba(255,255,255,.55);line-height:1.55}
.live-stage .lp-pill{display:inline-block;padding:6px 14px;border-radius:999px;font-size:11px;font-weight:700;background:rgba(59,130,246,.15);color:#60a5fa;margin-right:6px;margin-bottom:6px}
.live-stage .lp-card{background:#111;border:1px solid rgba(255,255,255,.08);border-radius:18px;padding:18px;position:relative;overflow:hidden}
.live-stage .lp-card .no{position:absolute;top:14px;right:14px;font-size:11px;font-weight:700;color:#60a5fa;letter-spacing:.1em}
.live-stage .lp-card .cat{font-size:10px;font-weight:700;letter-spacing:.14em;color:#60a5fa;margin-bottom:6px;text-transform:uppercase}
.live-stage .lp-card .nm{font-size:15px;font-weight:800;color:#fff;margin-bottom:4px;letter-spacing:-0.01em}
.live-stage .lp-card .sp{font-size:11px;color:rgba(255,255,255,.55);line-height:1.5}
.live-stage .lp-pgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:18px}
.live-stage .lp-hero{background:radial-gradient(900px 500px at 50% 30%,#1e293b 0%,#0a0f1c 60%,#000 100%);border-radius:18px;padding:36px;text-align:center;border:1px solid rgba(255,255,255,.08);margin-bottom:22px}
.live-stage .lp-hero .lp-tag{text-align:center}
.live-stage .lp-hero .lp-h1{text-align:center}
.live-stage .lp-hero .lp-sub{text-align:center;margin:0 auto}
.live-stage .lp-step{background:#0f0f12;border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:20px;position:relative}
.live-stage .lp-step .num{font-size:11px;font-weight:900;letter-spacing:.22em;color:#60a5fa;margin-bottom:10px}
.live-stage .lp-step .tt{font-size:16px;font-weight:900;color:#fff;margin-bottom:6px;letter-spacing:-0.01em}
.live-stage .lp-step .dd{font-size:12px;color:rgba(255,255,255,.55);line-height:1.6}
.live-stage .lp-timeline{position:relative;padding-left:22px;border-left:1px solid rgba(96,165,250,.3);margin-top:10px}
.live-stage .lp-timeline .it{position:relative;margin-bottom:18px}
.live-stage .lp-timeline .it::before{content:'';position:absolute;left:-27px;top:6px;width:10px;height:10px;border-radius:50%;background:#60a5fa;box-shadow:0 0 0 3px rgba(96,165,250,.2)}
.live-stage .lp-timeline .yr{font-size:13px;font-weight:900;color:#60a5fa;margin-bottom:3px}
.live-stage .lp-timeline .tx{font-size:13px;color:rgba(255,255,255,.85)}
.live-stage .lp-info{display:grid;grid-template-columns:repeat(2,1fr);gap:1px;background:rgba(255,255,255,.08);border-radius:18px;overflow:hidden;border:1px solid rgba(255,255,255,.08)}
.live-stage .lp-info .ib{background:#000;padding:20px}
.live-stage .lp-info .ib .lb2{font-size:10px;font-weight:700;letter-spacing:.16em;color:#60a5fa;margin-bottom:8px}
.live-stage .lp-info .ib .vl2{font-size:19px;font-weight:800;color:#fff;letter-spacing:-0.01em}
.live-stage .lp-info .ib .sm2{font-size:11px;color:rgba(255,255,255,.45);margin-top:3px}
.live-stage .lp-info .ib.full{grid-column:1/-1}
.live-stage [contenteditable="true"]{outline:none;border-radius:4px;padding:1px 4px;margin:-1px -4px;transition:background .12s}
.live-stage [contenteditable="true"]:hover{background:rgba(96,165,250,.12)}
.live-stage [contenteditable="true"]:focus{background:rgba(96,165,250,.22);box-shadow:inset 0 0 0 1px #60a5fa}
.live-hint{display:flex;align-items:center;gap:8px;font-size:11px;color:var(--tx4);margin-bottom:10px;padding:8px 12px;background:rgba(59,130,246,.08);border:1px dashed rgba(59,130,246,.3);border-radius:8px}
.live-hint b{color:var(--ac)}
.live-stage .arr-ctrl{position:absolute;top:8px;right:8px;display:flex;gap:4px;opacity:0;transition:opacity .15s}
.live-stage .arr-wrap:hover .arr-ctrl{opacity:1}
.live-stage .arr-wrap{position:relative}
.live-stage .arr-ctrl button{width:24px;height:24px;padding:0;border-radius:7px;background:rgba(0,0,0,.6);border:1px solid rgba(255,255,255,.2);color:#fff;font-size:12px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-weight:700}
.live-stage .arr-ctrl button:hover{background:#60a5fa;border-color:#60a5fa}
.live-stage .arr-ctrl button.del:hover{background:#ef4444;border-color:#ef4444}
.live-stage .arr-add{display:block;width:100%;padding:14px;margin-top:14px;border:2px dashed rgba(96,165,250,.4);background:rgba(59,130,246,.08);color:#60a5fa;border-radius:14px;font-weight:700;font-size:13px;cursor:pointer;transition:all .15s}
.live-stage .arr-add:hover{background:rgba(59,130,246,.18);border-color:#60a5fa}
.live-stage.light-sec .arr-ctrl button{background:rgba(255,255,255,.9);border:1px solid rgba(0,0,0,.1);color:#000}
.live-stage.light-sec .arr-add{border-color:rgba(37,99,235,.4);background:rgba(37,99,235,.08);color:#2563eb}

/* ============ TABLES ============ */
.tbl{width:100%;border-collapse:collapse;background:var(--sf);border:1px solid var(--bd);border-radius:14px;overflow:hidden}
.tbl thead{background:var(--cd)}
.tbl th{text-align:left;font-size:11px;color:var(--tx3);font-weight:700;padding:12px 14px;text-transform:uppercase;letter-spacing:.05em;border-bottom:1px solid var(--bd)}
.tbl td{padding:13px 14px;font-size:13px;border-bottom:1px solid var(--bd);vertical-align:middle}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:hover td{background:var(--cd)}
.tbl .ac{display:flex;gap:6px}
.tbl .ac button{padding:5px 10px;border:1px solid var(--bd);border-radius:7px;font-size:11px;font-weight:600;color:var(--tx2)}
.tbl .ac button:hover{background:var(--cd);color:var(--tx)}
.tbl .ac button.dn{color:var(--rd);border-color:rgba(239,68,68,.3)}

.fm-md{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:100;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(4px)}
.fm-md.active{display:flex}
.fm-bx{background:var(--sf);border:1px solid var(--bd);border-radius:16px;width:100%;max-width:560px;max-height:90vh;overflow-y:auto;box-shadow:var(--sd)}
.fm-hd{padding:18px 22px;border-bottom:1px solid var(--bd);display:flex;align-items:center}
.fm-hd .ti{font-weight:700;font-size:15px}
.fm-hd .cl{margin-left:auto;width:28px;height:28px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:16px;color:var(--tx3)}
.fm-hd .cl:hover{background:var(--cd);color:var(--tx)}
.fm-bd{padding:20px 22px}
.fm-ft{padding:14px 22px;border-top:1px solid var(--bd);display:flex;gap:8px;justify-content:flex-end}
.fm-fl{margin-bottom:14px}
.fm-fl label{display:block;font-size:11px;color:var(--tx3);margin-bottom:5px;font-weight:600;text-transform:uppercase;letter-spacing:.05em}
.fm-fl input,.fm-fl textarea,.fm-fl select{padding:10px 12px;background:var(--cd);border:1px solid var(--bd);border-radius:9px;font-size:13px}
.fm-fl input:focus,.fm-fl textarea:focus,.fm-fl select:focus{border-color:var(--ac)}
.fm-fl textarea{min-height:100px;resize:vertical;line-height:1.5}

/* ============ TOAST ============ */
.ts{position:fixed;bottom:22px;right:22px;background:var(--sf);border:1px solid var(--bd);border-left:3px solid var(--gn);border-radius:11px;padding:12px 18px;font-size:13px;font-weight:600;box-shadow:var(--sd);z-index:200;transform:translateX(calc(100% + 30px));transition:transform .3s}
.ts.active{transform:translateX(0)}
.ts.err{border-left-color:var(--rd)}

.sg{padding:60px 20px;text-align:center;color:var(--tx4);font-size:13px}
.bd-ht{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:14px}
.bd-ct{padding:7px 14px;background:var(--sf);border:1px solid var(--bd);border-radius:9px;font-size:12px;font-weight:600;color:var(--tx2);cursor:pointer}
.bd-ct.active{background:var(--ac);color:#fff;border-color:var(--ac)}

@media(max-width:900px){
  .sb{transform:translateX(-100%);transition:transform .2s}
  .sb.open{transform:translateX(0)}
  .main{margin-left:0}
  .st-grid{grid-template-columns:repeat(2,1fr)}
  .db-grid{grid-template-columns:1fr}
  .pg-list{grid-template-columns:1fr}
}

// ============== FIRESTORE REST (옵션) ==============
// 실제 연동 시 USE_FIREBASE = true 로 변경
const FS_URL = `https://firestore.googleapis.com/v1/projects/${FB.project}/databases/${FB.db}/documents`;
async function fsGet(path){
  const r = await fetch(`${FS_URL}/${path}?key=${FB.key}`);
  if(!r.ok) return null;
  return fromFd(await r.json());
}
async function fsPatch(path, data){
  const r = await fetch(`${FS_URL}/${path}?key=${FB.key}`, {
    method:'PATCH',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({fields: toFv(data)})
  });
  return r.ok;
}
function toFv(obj){
  const f = {};
  for(const k in obj){
    const v = obj[k];
    if(typeof v === 'string') f[k] = {stringValue:v};
    else if(typeof v === 'number') f[k] = {integerValue:v};
    else if(typeof v === 'boolean') f[k] = {booleanValue:v};
    else if(Array.isArray(v)) f[k] = {arrayValue:{values:v.map(x=>toFv({_:x})._)}};
    else if(v && typeof v === 'object') f[k] = {mapValue:{fields:toFv(v)}};
  }
  return f;
}
function fromFd(d){
  if(!d || !d.fields) return null;
  const o = {};
  for(const k in d.fields){
    const v = d.fields[k];
    o[k] = v.stringValue ?? v.integerValue ?? v.booleanValue ?? null;
  }
  return o;
}

  if(!S.arrays[arrKey]) S.arrays[arrKey] = [];
  const tpl = S.arrays[arrKey][0] ? Object.fromEntries(Object.keys(S.arrays[arrKey][0]).map(k=>[k, k==='no'? (S.arrays[arrKey].length+1) : '새 항목'])) : { t:'새 항목' };

  saveLocal(); R(); toast('항목이 추가되었습니다');
}

  if(!confirm('이 항목을 삭제하시겠습니까?')) return;
  S.arrays[arrKey].splice(idx,1);
  saveLocal(); R(); toast('삭제되었습니다');
}
function arrMove(arrKey, idx, dir){
  const arr = S.arrays[arrKey];
  const j = idx + dir;
  if(j < 0 || j >= arr.length) return;
  [arr[idx], arr[j]] = [arr[j], arr[idx]];
  saveLocal(); R();
}
function sImgUp(iid, inp){
  const f = inp.files[0]; if(!f) return;
  const r = new FileReader();
  r.onload = e => { S.images[iid] = e.target.result; R(); };
  r.readAsDataURL(f);
}

function openInq(id){
  const q = S.inquiries.find(x=>x.id===id); if(!q) return;
  openModal('문의 답변', `
    <div class="fm-fl"><label>이름</label><div class="ed-in">${q.nm} · ${q.co||''}</div></div>
    <div class="fm-fl"><label>문의 내용</label><div class="ed-in" style="min-height:60px">${escHtml(q.msg)}</div></div>
    <div class="fm-fl"><label>답변</label><textarea id="mdReply" placeholder="답변을 입력하세요">${escHtml(q.reply||'')}</textarea></div>
    <div class="fm-fl"><label>상태</label><select id="mdSt">
      <option value="new" ${q.st==='new'?'selected':''}>신규</option>
      <option value="pending" ${q.st==='pending'?'selected':''}>대기</option>
      <option value="replied" ${q.st==='replied'?'selected':''}>완료</option>
    </select></div>
  `, [
    { label:'취소', fn:'closeModal()' },
    { label:'저장', pri:true, fn:`saveInq('${id}')` }
  ]);
}
function saveInq(id){
  const q = S.inquiries.find(x=>x.id===id); if(!q) return;
  q.reply = document.getElementById('mdReply').value;
  q.st    = document.getElementById('mdSt').value;
  saveLocal(); closeModal(); R(); toast('답변이 저장되었습니다');
}
function delInq(id){
  if(!confirm('삭제하시겠습니까?')) return;
  S.inquiries = S.inquiries.filter(x=>x.id!==id);
  saveLocal(); R(); toast('삭제되었습니다');
}
// 챗봇이 localStorage에 직접 쓴 신규 문의를 불러와 병합
function refreshInq(){
  try {
    const raw = JSON.parse(localStorage.getItem('usung-cms-state-v2') || 'null');
    if(raw && Array.isArray(raw.inquiries)){
      S.inquiries = raw.inquiries;
      R();
      toast(`새로고침 완료 · 총 ${S.inquiries.length}건`);
      return;
    }
  } catch(e){}
  toast('저장된 데이터가 없습니다', true);

function rBoard(k){
  const B = BOARDS[k];
  const list = S.boards[k] || [];
  const cat = S.filterCat[k];
  const sort = S.sortBy[k];
  let fl = list.filter(x => cat==='전체' || x.cat===cat);
  if(sort==='latest') fl.sort((a,b)=>b.createdAt-a.createdAt);
  else if(sort==='views') fl.sort((a,b)=>(b.views||0)-(a.views||0));

  let h = `<div class="vw-hd">
    <div><div class="vw-ti">${B.ic} ${B.name}</div><div class="vw-sub">총 ${fl.length}건</div></div>
    <div class="tb-sp"></div>
    <div class="mode-sw">
      <button class="${sort==='latest'?'active':''}" onclick="bdSort('${k}','latest')">최신순</button>
      <button class="${sort==='views'?'active':''}" onclick="bdSort('${k}','views')">조회순</button>
    </div>
    <button class="tb-btn pri" onclick="bdNew('${k}')">+ 새 글 작성</button>
  </div>`;
  h += `<div class="bd-ht">`;
  B.categories.forEach(c=>{
    h += `<button class="bd-ct ${cat===c?'active':''}" onclick="bdCat('${k}','${c}')">${c}</button>`;
  });
  h += `</div>`;
  h += `<table class="tbl"><thead><tr>
    <th style="width:80px">분류</th><th>제목</th><th style="width:100px">${k==='board'?'작성자':'유형'}</th><th style="width:80px">조회</th><th style="width:120px">등록일</th><th style="width:130px;text-align:right">관리</th>
  </tr></thead><tbody>`;
  if(fl.length === 0){
    h += `<tr><td colspan="6"><div class="sg">게시물이 없습니다</div></td></tr>`;
  }
  fl.forEach(it=>{
    const badge = it.pin ? '<span class="tg tg-new" style="margin-right:6px">📌</span>' : '';
    const metaCol = k==='board' ? (it.author||'-') : (it.ftype||'-');
    h += `<tr>
      <td><span style="font-size:11px;padding:3px 8px;background:var(--cd);border-radius:6px;color:var(--tx3)">${it.cat||'-'}</span></td>
      <td><b>${badge}${escHtml(it.title)}</b></td>
      <td style="color:var(--tx3);font-size:12px">${escHtml(metaCol)}</td>
      <td style="color:var(--tx3);font-size:12px">${it.views||0}</td>
      <td style="color:var(--tx4);font-size:12px">${fmtDate(it.createdAt)}</td>
      <td><div class="ac" style="justify-content:flex-end">
        <button onclick="bdEdit('${k}','${it.id}')">편집</button>
        <button class="dn" onclick="bdDel('${k}','${it.id}')">삭제</button>
      </div></td>
    </tr>`;
  });
  h += `</tbody></table>`;
  return h;
}
function bdCat(k,c){ S.filterCat[k]=c; R(); }
function bdSort(k,s){ S.sortBy[k]=s; R(); }
function bdNew(k){ bdForm(k, null); }
function bdEdit(k,id){ bdForm(k, id); }
function bdForm(k, id){
  const B = BOARDS[k];
  const it = id ? S.boards[k].find(x=>x.id===id) : {};
  let h = '';
  B.fields.forEach(f=>{
    const v = it[f.id] || '';
    h += `<div class="fm-fl"><label>${f.label}${f.req?' *':''}</label>`;
    if(f.type==='textarea')  h += `<textarea id="fld_${f.id}" placeholder="${f.ph||''}">${escHtml(v)}</textarea>`;
    else if(f.type==='select'){
      h += `<select id="fld_${f.id}">`;
      (f.opts||[]).forEach(o=>{ h += `<option value="${o}" ${v===o?'selected':''}>${o}</option>`; });
      h += `</select>`;
    }
    else if(f.type==='check')h += `<div style="padding:10px"><label style="display:flex;gap:8px;align-items:center;font-size:13px"><input type="checkbox" id="fld_${f.id}" ${v?'checked':''} style="width:auto" /> 상단 고정</label></div>`;
    else                      h += `<input type="text" id="fld_${f.id}" value="${escHtml(v)}" placeholder="${f.ph||''}" />`;
    h += `</div>`;
  });
  openModal(id?`${B.name} 수정`:`${B.name} 작성`, h, [
    { label:'취소', fn:'closeModal()' },
    { label:id?'수정':'등록', pri:true, fn:`bdSave('${k}','${id||''}')` }
  ]);
}
function bdSave(k, id){
  const B = BOARDS[k];
  const data = {};
  B.fields.forEach(f=>{
    const el = document.getElementById('fld_'+f.id);
    data[f.id] = f.type==='check' ? el.checked : el.value;
    if(f.req && !data[f.id]){ toast(`${f.label}을(를) 입력하세요`,true); throw new Error('req'); }
  });
  if(id){
    const it = S.boards[k].find(x=>x.id===id);
    Object.assign(it, data);
  } else {
    S.boards[k].unshift({ id:'x'+Date.now(), ...data, views:0, createdAt:Date.now() });
  }
  saveLocal(); closeModal(); R(); toast('저장되었습니다');
}
function bdDel(k, id){
  if(!confirm('삭제하시겠습니까?')) return;
  S.boards[k] = S.boards[k].filter(x=>x.id!==id);
  saveLocal(); R(); toast('삭제되었습니다');
}

function botKBEdit(ix, field, val){

}
function botKBAdd(){

}
function botKBDel(ix){
  if(!confirm('이 Q&A를 삭제하시겠습니까?')) return;
  const kb = bot().getKB();
  kb.splice(ix,1);
  bot().setKB(kb); R(); toast('삭제됨');
}
function botKBMove(ix, d){
  const kb = bot().getKB();
  const j = ix + d;
  if(j<0 || j>=kb.length) return;
  [kb[ix], kb[j]] = [kb[j], kb[ix]];
  bot().setKB(kb); R();
}

    <div class="cd"><div class="cd-ti">데이터 백업 <div class="ln"></div></div>
      <p style="font-size:12px;color:var(--tx3);margin-bottom:12px">전체 콘텐츠와 게시물을 JSON 파일로 내려받거나 업로드할 수 있습니다</p>
      <div style="display:flex;gap:8px">
        <button class="tb-btn" onclick="exportJSON()">⬇ JSON 내보내기</button>
        <button class="tb-btn" onclick="document.getElementById('impFile').click()">⬆ JSON 불러오기</button>
        <input type="file" id="impFile" accept=".json" style="display:none" onchange="importJSON(this)" />
      </div>
    </div>
    <div class="cd"><div class="cd-ti">Firebase 연동 <div class="ln"></div></div>
      <div style="font-size:12px;color:var(--tx3);margin-bottom:10px">현재 상태 : <b style="color:${USE_FIREBASE?'var(--gn)':'var(--am)'}">${USE_FIREBASE?'연결됨':'로컬 모드'}</b></div>
      <div style="font-size:11px;color:var(--tx4);font-family:monospace;padding:10px;background:var(--cd);border-radius:8px">
        project : ${FB.project}<br>
        db : ${FB.db}<br>
        key : ${FB.key === 'YOUR_WEB_API_KEY' ? '(미설정)' : '●●●●●●●'}
      </div>
      <p style="font-size:11px;color:var(--tx4);margin-top:10px">Firebase 연동 방법 : admin.html 상단 <code>FB</code> 객체에 실제 값 입력 후 <code>USE_FIREBASE = true</code> 로 변경하세요</p>
    </div>
    <div class="cd"><div class="cd-ti">비밀번호 변경 <div class="ln"></div></div>
      <p style="font-size:12px;color:var(--tx3);margin-bottom:10px">데모 버전에서는 ADMIN 객체를 직접 수정하거나 Firebase Auth 연동을 권장합니다</p>
      <button class="tb-btn" onclick="toast('Firebase Auth 연동 후 사용 가능합니다')">비밀번호 변경</button>
    </div>
  `;
}
function setTheme(t){
  S.theme = t;
  document.body.classList.toggle('light', t==='light');
  saveLocal(); R();
}
function toggleTheme(){ setTheme(S.theme==='dark'?'light':'dark'); }

function exportJSON(){
  const blob = new Blob([JSON.stringify({content:S.content, arrays:S.arrays, boards:S.boards, inquiries:S.inquiries}, null, 2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `usung-cms-${new Date().toISOString().slice(0,10)}.json`;
  a.click(); URL.revokeObjectURL(url);
  toast('내보내기 완료');
}
function importJSON(inp){
  const f = inp.files[0]; if(!f) return;
  const r = new FileReader();
  r.onload = e => {
    try{
      const d = JSON.parse(e.target.result);
      if(d.content) S.content = {...D, ...d.content};
      if(d.arrays) S.arrays = d.arrays;
      if(d.boards) S.boards = d.boards;
      if(d.inquiries) S.inquiries = d.inquiries;
      saveLocal(); R(); toast('불러오기 완료');
    }catch(err){ toast('잘못된 파일입니다', true); }
  };
  r.readAsText(f);
}

// ============== MODAL / TOAST ==============
function openModal(ti, bd, ft){
  document.getElementById('mdTitle').textContent = ti;
  document.getElementById('mdBody').innerHTML = bd;
  document.getElementById('mdFoot').innerHTML = (ft||[]).map(b=>
    `<button class="tb-btn ${b.pri?'pri':''}" onclick="${b.fn}">${b.label}</button>`
  ).join('');
  document.getElementById('modal').classList.add('active');
}
function closeModal(){ document.getElementById('modal').classList.remove('active'); }

let tsTm;
function toast(msg, err){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.toggle('err', !!err);
  t.classList.add('active');
  clearTimeout(tsTm);
  tsTm = setTimeout(()=>t.classList.remove('active'), 2600);
}

function fmtDate(ts){
  const d = new Date(ts);
  return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}`;
}

// ============== INIT ==============
if(sessionStorage.getItem('cms-auth') === '1'){
  showApp();
}
document.getElementById('loginPw').addEventListener('keypress', e=>{
  if(e.key === 'Enter') doLogin();
});
</script>

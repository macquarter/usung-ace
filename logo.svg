<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 180" width="400" height="180">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a4b9c"/>
      <stop offset="100%" style="stop-color:#2558a8"/>
    </linearGradient>
  </defs>
  <!-- 타원 배경 -->
  <ellipse cx="175" cy="80" rx="165" ry="70" fill="url(#bg)"/>
  <!-- 상단 곡선 장식 -->
  <path d="M45,45 Q175,15 305,45" stroke="#fff" stroke-width="2.5" fill="none" opacity="0.9"/>
  <path d="M55,55 Q175,28 295,55" stroke="#fff" stroke-width="1.5" fill="none" opacity="0.6"/>
  <!-- 유성에이스 텍스트 -->
  <text x="175" y="95" text-anchor="middle" font-family="'Pretendard Variable','Pretendard','Malgun Gothic',sans-serif" font-size="42" font-weight="900" fill="#ffffff" letter-spacing="3">유성에이스</text>
  <!-- 신개념신기술 텍스트 -->
  <text x="320" y="160" text-anchor="end" font-family="'Pretendard Variable','Pretendard','Malgun Gothic',sans-serif" font-size="24" font-weight="800" fill="#1a4b9c" letter-spacing="2">신개념신기술</text>
</svg>
